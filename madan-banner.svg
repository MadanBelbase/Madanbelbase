<svg width="680" height="180" viewBox="0 0 680 180" role="img" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
<title>Madan Belbase - crazy glitch</title>
<defs>
<filter id="glitchFX" x="-30%" y="-60%" width="160%" height="220%">
<feTurbulence type="fractalNoise" baseFrequency="0.01 0.9" numOctaves="2" seed="7" result="turb">
<animate attributeName="baseFrequency" values="0.01 0.9;0.12 0.02;0.01 0.9" dur="0.4s" repeatCount="indefinite"/>
</feTurbulence>
<feDisplacementMap in="SourceGraphic" in2="turb" xChannelSelector="R" yChannelSelector="G">
<animate attributeName="scale" values="0;0;60;15;0;0;0;45;10;0" keyTimes="0;.02;.05;.08;.10;.55;.57;.60;.62;1" dur="3.5s" repeatCount="indefinite"/>
</feDisplacementMap>
</filter>
<filter id="hueBorder">
<feColorMatrix type="hueRotate" values="0">
<animate attributeName="values" values="0;360" dur="5s" repeatCount="indefinite"/>
</feColorMatrix>
</filter>
<radialGradient id="bg" cx="50%" cy="35%" r="85%">
<stop offset="0%" stop-color="#1a1230"/>
<stop offset="100%" stop-color="#040308"/>
</radialGradient>
<clipPath id="band0"><rect x="0" y="45" width="680" height="15"/></clipPath>
<clipPath id="band1"><rect x="0" y="60" width="680" height="15"/></clipPath>
<clipPath id="band2"><rect x="0" y="75" width="680" height="15"/></clipPath>
<clipPath id="band3"><rect x="0" y="90" width="680" height="15"/></clipPath>
<clipPath id="band4"><rect x="0" y="105" width="680" height="15"/></clipPath>
</defs>

<style>
.m{font:400 12px "Courier New",monospace;opacity:.28}
.r,.c,.y,.w{font:700 58px "Courier New",monospace;text-anchor:middle}
.r{fill:#ff2d55;opacity:.85;animation:j1 .9s steps(2) infinite}
.c{fill:#00e5ff;opacity:.85;animation:j2 1.1s steps(2) infinite}
.y{fill:#ff2dff;opacity:.6;animation:j3 .7s steps(2) infinite}
.w{fill:#ffffff}
.f{animation:flip 2.6s ease-in-out infinite}
.all{animation:flick 3.2s steps(1) infinite}
.scene{animation:shake 3.5s steps(1) infinite}
.slice{font:700 58px "Courier New",monospace;text-anchor:middle;fill:#e8fbff;opacity:0;letter-spacing:2px}
@keyframes j1{0%,100%{transform:translate(0,0)}15%{transform:translate(-6px,3px)}35%{transform:translate(4px,-4px)}55%{transform:translate(-4px,-2px)}75%{transform:translate(5px,2px)}90%{transform:translate(-3px,4px)}}
@keyframes j2{0%,100%{transform:translate(0,0)}20%{transform:translate(6px,-3px)}40%{transform:translate(-4px,4px)}60%{transform:translate(4px,3px)}80%{transform:translate(-5px,-2px)}}
@keyframes j3{0%,100%{transform:translate(0,0)}25%{transform:translate(-4px,-5px)}50%{transform:translate(5px,3px)}75%{transform:translate(-3px,4px)}}
@keyframes flip{0%,55%,100%{transform:scaleX(1) skewX(0deg)}62%{transform:scaleX(-1) skewX(8deg)}68%{transform:scaleX(-1.15) skewX(-6deg)}74%{transform:scaleX(1) skewX(4deg)}80%{transform:scaleX(1)}}
@keyframes flick{0%,100%{opacity:1}88%{opacity:.2}89%{opacity:1}91%{opacity:.15}92%{opacity:1}93%{opacity:.5}94%{opacity:1}}
@keyframes shake{0%,12%,100%{transform:translate(0,0) rotate(0deg)}2%{transform:translate(-4px,2px) rotate(-.5deg)}4%{transform:translate(3px,-3px) rotate(.5deg)}6%{transform:translate(-3px,-2px) rotate(-.3deg)}8%{transform:translate(4px,3px) rotate(.4deg)}10%{transform:translate(-2px,1px) rotate(0deg)}55%{transform:translate(4px,-2px) rotate(.4deg)}57%{transform:translate(-4px,2px) rotate(-.4deg)}59%{transform:translate(3px,3px) rotate(.3deg)}61%{transform:translate(0,0) rotate(0deg)}}
</style>

<rect x="0" y="0" width="680" height="180" rx="14" fill="url(#bg)"/>
<rect x="2" y="2" width="676" height="176" rx="12" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.5" filter="url(#hueBorder)"/>

<g class="m" fill="#00ff9c">
<text x="30" y="0">1<tspan x="30" dy="14">0</tspan><tspan x="30" dy="14">1</tspan><tspan x="30" dy="14">1</tspan><tspan x="30" dy="14">0</tspan><tspan x="30" dy="14">1</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="1.8s" repeatCount="indefinite"/></text>
<text x="90" y="0">0<tspan x="90" dy="14">1</tspan><tspan x="90" dy="14">0</tspan><tspan x="90" dy="14">1</tspan><tspan x="90" dy="14">0</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="2.4s" begin="0.5s" repeatCount="indefinite"/></text>
<text x="150" y="0">1<tspan x="150" dy="14">1</tspan><tspan x="150" dy="14">0</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="1.5s" begin="0.9s" repeatCount="indefinite"/></text>
</g>
<g class="m" fill="#00e5ff">
<text x="260" y="0">0<tspan x="260" dy="14">0</tspan><tspan x="260" dy="14">1</tspan><tspan x="260" dy="14">1</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="2.1s" begin="0.3s" repeatCount="indefinite"/></text>
<text x="310" y="0">1<tspan x="310" dy="14">0</tspan><tspan x="310" dy="14">0</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="1.7s" begin="1.1s" repeatCount="indefinite"/></text>
</g>
<g class="m" fill="#ff2dff">
<text x="420" y="0">1<tspan x="420" dy="14">1</tspan><tspan x="420" dy="14">0</tspan><tspan x="420" dy="14">1</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="2.6s" begin="0.7s" repeatCount="indefinite"/></text>
</g>
<g class="m" fill="#00ff9c">
<text x="530" y="0">0<tspan x="530" dy="14">1</tspan><tspan x="530" dy="14">1</tspan><tspan x="530" dy="14">0</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="1.9s" begin="1.3s" repeatCount="indefinite"/></text>
<text x="590" y="0">1<tspan x="590" dy="14">0</tspan><tspan x="590" dy="14">1</tspan><tspan x="590" dy="14">0</tspan><tspan x="590" dy="14">1</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="2.3s" begin="0.2s" repeatCount="indefinite"/></text>
<text x="650" y="0">0<tspan x="650" dy="14">0</tspan><tspan x="650" dy="14">1</tspan><animateTransform attributeName="transform" type="translate" values="0,-90;0,270" dur="1.6s" begin="1.6s" repeatCount="indefinite"/></text>
</g>

<g class="scene" filter="url(#glitchFX)">
<g class="all">
<g transform="translate(138,108)"><g class="f" style="animation-delay:0s"><text class="r">M</text><text class="c">M</text><text class="y">M</text><text class="w">M</text></g></g>
<g transform="translate(172,108)"><g class="f" style="animation-delay:.08s"><text class="r">A</text><text class="c">A</text><text class="y">A</text><text class="w">A</text></g></g>
<g transform="translate(206,108)"><g class="f" style="animation-delay:.16s"><text class="r">D</text><text class="c">D</text><text class="y">D</text><text class="w">D</text></g></g>
<g transform="translate(239,108)"><g class="f" style="animation-delay:.24s"><text class="r">A</text><text class="c">A</text><text class="y">A</text><text class="w">A</text></g></g>
<g transform="translate(273,108)"><g class="f" style="animation-delay:.32s"><text class="r">N</text><text class="c">N</text><text class="y">N</text><text class="w">N</text></g></g>
<g transform="translate(340,108)"><g class="f" style="animation-delay:.40s"><text class="r">B</text><text class="c">B</text><text class="y">B</text><text class="w">B</text></g></g>
<g transform="translate(374,108)"><g class="f" style="animation-delay:.48s"><text class="r">E</text><text class="c">E</text><text class="y">E</text><text class="w">E</text></g></g>
<g transform="translate(407,108)"><g class="f" style="animation-delay:.56s"><text class="r">L</text><text class="c">L</text><text class="y">L</text><text class="w">L</text></g></g>
<g transform="translate(441,108)"><g class="f" style="animation-delay:.64s"><text class="r">B</text><text class="c">B</text><text class="y">B</text><text class="w">B</text></g></g>
<g transform="translate(474,108)"><g class="f" style="animation-delay:.72s"><text class="r">A</text><text class="c">A</text><text class="y">A</text><text class="w">A</text></g></g>
<g transform="translate(508,108)"><g class="f" style="animation-delay:.80s"><text class="r">S</text><text class="c">S</text><text class="y">S</text><text class="w">S</text></g></g>
<g transform="translate(542,108)"><g class="f" style="animation-delay:.88s"><text class="r">E</text><text class="c">E</text><text class="y">E</text><text class="w">E</text></g></g>
</g>

<g clip-path="url(#band0)">
<g>
<text class="slice" x="340" y="108" fill="#ffffff" opacity="0">MADAN BELBASE
<animate attributeName="opacity" values="0;0;.9;.9;0" keyTimes="0;.09;.10;.12;.13" dur="3.5s" begin="0s" repeatCount="indefinite"/>
</text>
<animateTransform attributeName="transform" type="translate" values="0,0;0,0;22,0;22,0;0,0" keyTimes="0;.09;.10;.12;.13" dur="3.5s" begin="0s" repeatCount="indefinite"/>
</g>
</g>
