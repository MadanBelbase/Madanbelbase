<g>
<text class="slice" x="340" y="108" fill="#ff2d55" opacity="0">MADAN BELBASE
<animate attributeName="opacity" values="0;0;.85;.85;0" keyTimes="0;.55;.56;.58;.59" dur="3.5s" begin="0s" repeatCount="indefinite"/>
</text>
<animateTransform attributeName="transform" type="translate" values="0,0;0,0;18,0;18,0;0,0" keyTimes="0;.55;.56;.58;.59" dur="3.5s" begin="0s" repeatCount="indefinite"/>
</g>
</g>
<g clip-path="url(#band3)">
<g>
<text class="slice" x="340" y="108" fill="#ff2dff" opacity="0">MADAN BELBASE
<animate attributeName="opacity" values="0;0;.8;.8;0" keyTimes="0;.57;.58;.60;.61" dur="3.5s" begin=".03s" repeatCount="indefinite"/>
</text>
<animateTransform attributeName="transform" type="translate" values="0,0;0,0;-32,0;-32,0;0,0" keyTimes="0;.57;.58;.60;.61" dur="3.5s" begin=".03s" repeatCount="indefinite"/>
</g>
</g>
<g clip-path="url(#band4)">
<g>
<text class="slice" x="340" y="108" fill="#ffffff" opacity="0">MADAN BELBASE
<animate attributeName="opacity" values="0;0;.9;.9;0" keyTimes="0;.61;.62;.64;.65" dur="3.5s" begin="0s" repeatCount="indefinite"/>
</text>
<animateTransform attributeName="transform" type="translate" values="0,0;0,0;14,0;14,0;0,0" keyTimes="0;.61;.62;.64;.65" dur="3.5s" begin="0s" repeatCount="indefinite"/>
</g>
</g>
</g>

<rect x="0" y="0" width="680" height="7" fill="#ffffff" opacity="0.08"><animate attributeName="y" values="-10;190" dur="1.4s" repeatCount="indefinite"/></rect>
<rect x="0" y="0" width="680" height="4" fill="#00e5ff" opacity="0"><animate attributeName="opacity" values="0;0;.55;0;0" keyTimes="0;.28;.30;.32;1" dur="3.5s" repeatCount="indefinite"/><animate attributeName="y" values="20;140" dur="3.5s" repeatCount="indefinite"/></rect>
<rect x="0" y="0" width="680" height="4" fill="#ff2dff" opacity="0"><animate attributeName="opacity" values="0;0;.5;0;0" keyTimes="0;.63;.65;.67;1" dur="3.5s" repeatCount="indefinite"/><animate attributeName="y" values="140;30" dur="3.5s" repeatCount="indefinite"/></rect>
</svg>
