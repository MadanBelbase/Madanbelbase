<g>
<text class="slice" x="340" y="108" fill="#00e5ff" opacity="0">MADAN BELBASE
<animate attributeName="opacity" values="0;0;.85;.85;0" keyTimes="0;.10;.11;.13;.14" dur="3.5s" begin=".05s" repeatCount="indefinite"/>
</text>
<animateTransform attributeName="transform" type="translate" values="0,0;0,0;-28,0;-28,0;0,0" keyTimes="0;.10;.11;.13;.14" dur="3.5s" begin=".05s" repeatCount="indefinite"/>
</g>
</g>
